<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="ST Image Optimizer Pro">
<meta property="og:description" content="Free Serverless Image Compressor & Watermark Tool. Built by Samitha Tharanga Wijesinghe.">
<meta property="og:image" content="https://raw.githubusercontent.com/samithatharanga/st-image-optimizer/main/preview.png"> <!-- මෙතනට ඔයාගේ ඇප් එකේ ස්ක්‍රීන්ෂොට් එකක් දාන්න -->
<meta property="og:url" content="https://samithatharanga.github.io/image-optimizer-pro/">
    <link rel="manifest" href="manifest.json">
    <title>Image Optimizer Pro | Samitha Tharanga Wijesinghe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Compressor.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <style>
        /* Apple Style System Font */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #050505;
        }
        
        /* Smooth Scrolling Fix */
        html, body {
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Animated Background Orbs for Glass Effect */
        .bg-shape1 {
            position: fixed; width: 50vw; height: 50vw; border-radius: 50%;
            background: linear-gradient(135deg, rgba(67, 56, 202, 0.4), rgba(109, 40, 217, 0.2));
            top: -10%; left: -10%; filter: blur(90px); z-index: -1;
            animation: float1 15s infinite alternate ease-in-out;
        }
        .bg-shape2 {
            position: fixed; width: 40vw; height: 40vw; border-radius: 50%;
            background: linear-gradient(135deg, rgba(190, 24, 93, 0.3), rgba(225, 29, 72, 0.15));
            bottom: -10%; right: -5%; filter: blur(100px); z-index: -1;
            animation: float2 12s infinite alternate ease-in-out;
        }

        @keyframes float1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(5%, 5%) scale(1.1); } }
        @keyframes float2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-5%, -5%) scale(1.05); } }

        /* Premium Glass Panel */
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Glass Input & Buttons */
        .glass-element {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .glass-element:hover, .glass-element:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.25);
            outline: none;
        }

        /* Apple Style Range Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: #ffffff; cursor: pointer; margin-top: -10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 1px solid rgba(0,0,0,0.1);
            
        }

        // Register Service Worker for PWA Installation
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered!'))
                .catch(err => console.error('Service Worker Registration Failed!', err));
            });
        }
    </style>
</head>
<!-- Removed justify-center and added mt-10 mb-20 to allow natural scrolling -->
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8 relative text-white pb-20 pt-10">
    
    <!-- Background Elements -->
    <div class="bg-shape1"></div>
    <div class="bg-shape2"></div>

    <!-- Main App Container (Glass) -->
    <div class="glass-morphism relative z-10 rounded-[2.5rem] p-6 sm:p-10 w-full max-w-2xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold tracking-tight text-white/95">Optimizer Pro</h1>
            <p class="text-white/50 mt-2 text-sm font-medium">Compress & Watermark beautifully. 100% Client-side.</p>
        </div>

        <!-- Upload Area -->
        <div id="drop-area" class="glass-element rounded-3xl p-10 text-center cursor-pointer transition-all duration-300 border-dashed border-2 border-white/20 hover:border-white/40">
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <svg class="mx-auto h-12 w-12 text-white/60 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <p class="text-white/80 text-lg font-medium tracking-wide">Tap to browse or drop a photo</p>
        </div>

        <!-- Controls Area (Hidden initially) -->
        <div id="controls-area" class="hidden mt-8 space-y-6">
            
            <div class="flex gap-4 flex-col sm:flex-row">
                <!-- Quality Slider -->
                <div class="glass-element p-5 rounded-2xl flex-1">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-sm font-medium text-white/80">Quality</label>
                        <span id="quality-val" class="font-bold text-white tracking-wide">80%</span>
                    </div>
                    <input type="range" id="quality" min="0" max="100" value="80" class="w-full">
                </div>

                <!-- Format Selection (New Feature) -->
                <div class="glass-element p-5 rounded-2xl sm:w-1/3">
                    <label class="block text-sm font-medium text-white/80 mb-3">Format</label>
                    <select id="format" class="w-full bg-transparent text-white font-medium focus:outline-none cursor-pointer appearance-none">
                        <option value="image/jpeg" class="text-black">JPEG</option>
                        <option value="image/webp" class="text-black" selected>WebP (Best)</option>
                        <option value="image/png" class="text-black">PNG</option>
                    </select>
                </div>
            </div>

            <!-- Watermark Input -->
            <div class="glass-element p-5 rounded-2xl">
                <label class="block text-sm font-medium text-white/80 mb-3">Watermark Label (Optional)</label>
                <input type="text" id="watermark" placeholder="e.g. Samitha Tharanga" class="w-full bg-transparent text-white focus:outline-none placeholder-white/30 font-medium text-lg">
            </div>

            <button id="process-btn" class="w-full glass-element text-white font-semibold py-4 px-4 rounded-2xl transition-all shadow-lg transform active:scale-95 text-lg flex justify-center items-center gap-2 hover:bg-white hover:text-black">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Process Image
            </button>
        </div>

        <!-- Result Area (Hidden initially) -->
        <div id="result-area" class="hidden mt-8 border-t border-white/10 pt-8 text-center">
            
            <div class="flex gap-4 mb-6">
                <div class="flex-1 glass-element rounded-2xl p-4">
                    <p class="text-white/50 text-[10px] sm:text-xs uppercase tracking-widest mb-1 font-semibold">Original Size</p>
                    <p id="size-old" class="font-medium text-white text-lg"></p>
                </div>
                <div class="flex-1 glass-element rounded-2xl p-4 border border-green-400/30">
                    <p class="text-white/50 text-[10px] sm:text-xs uppercase tracking-widest mb-1 font-semibold">Optimized Size</p>
                    <p id="size-new" class="font-bold text-green-400 text-lg"></p>
                </div>
            </div>

            <div class="glass-element p-2 rounded-2xl inline-block w-full mb-6 relative group">
                <img id="preview-img" class="max-h-80 mx-auto rounded-xl object-contain w-full" src="" alt="Preview">
            </div>
            
            <!-- Save Button -->
            <a id="download-btn" href="#" download="Optimized.jpg" class="flex justify-center items-center gap-2 w-full bg-white text-black font-bold py-4 px-6 rounded-2xl hover:bg-gray-200 transition-colors shadow-[0_0_20px_rgba(255,255,255,0.3)] text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Save Image
            </a>
        </div>
    </div>

    <!-- Developer Branding -->
    <div class="relative z-10 mt-10 text-center">
        <p class="text-white/40 text-xs font-semibold tracking-widest uppercase">Engineered & Developed by</p>
        <p class="text-white/70 text-sm mt-1 font-medium tracking-wide">Samitha Tharanga Wijesinghe</p>
    </div>

    <!-- App Logic -->
    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const controlsArea = document.getElementById('controls-area');
        const processBtn = document.getElementById('process-btn');
        const resultArea = document.getElementById('result-area');
        const previewImg = document.getElementById('preview-img');
        const downloadBtn = document.getElementById('download-btn');
        const qualitySlider = document.getElementById('quality');
        const qualityVal = document.getElementById('quality-val');
        const formatSelect = document.getElementById('format');
        
        let selectedFile = null;

        dropArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                dropArea.classList.add('bg-white/10', 'border-white/50');
                dropArea.innerHTML = `<p class="text-white font-semibold text-lg tracking-wide">${selectedFile.name}</p><p class="text-green-400/80 text-sm mt-1 font-medium">Ready to optimize</p>`;
                controlsArea.classList.remove('hidden');
                resultArea.classList.add('hidden');
            }
        });

        qualitySlider.addEventListener('input', (e) => {
            qualityVal.textContent = e.target.value + '%';
        });

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        processBtn.addEventListener('click', () => {
            if(!selectedFile) return;
            
            processBtn.innerHTML = `Processing...`;
            processBtn.disabled = true;
            processBtn.classList.add('opacity-50');

            const quality = parseInt(qualitySlider.value) / 100;
            const watermarkText = document.getElementById('watermark').value;
            const selectedFormat = formatSelect.value;
            
            // File extension based on format
            let ext = 'jpg';
            if(selectedFormat === 'image/webp') ext = 'webp';
            if(selectedFormat === 'image/png') ext = 'png';

            new Compressor(selectedFile, {
                quality: quality,
                mimeType: selectedFormat,
                drew(context, canvas) {
                    if(watermarkText.trim() !== "") {
                        context.fillStyle = 'rgba(255, 255, 255, 0.85)';
                        const fontSize = Math.max(canvas.height / 22, 16); 
                        context.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
                        context.textAlign = 'right';
                        context.textBaseline = 'bottom';
                        
                        context.shadowColor = "rgba(0,0,0,0.6)";
                        context.shadowBlur = Math.max(fontSize / 3, 4);
                        
                        // Padding from the edge
                        const padding = fontSize * 0.5;
                        context.fillText(watermarkText, canvas.width - padding, canvas.height - padding);
                    }
                },
                success(result) {
                    processBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg> Process Image`;
                    processBtn.disabled = false;
                    processBtn.classList.remove('opacity-50');

                    document.getElementById('size-old').textContent = formatBytes(selectedFile.size);
                    document.getElementById('size-new').textContent = formatBytes(result.size);
                    
                    const url = URL.createObjectURL(result);
                    previewImg.src = url;
                    
                    const originalName = selectedFile.name.split('.')[0];
                    downloadBtn.href = url;
                    downloadBtn.download = `${originalName}-Optimized.${ext}`;
                    
                    resultArea.classList.remove('hidden');
                    
                    // Smooth scroll to results
                    setTimeout(() => {
                        downloadBtn.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 100);
                },
                error(err) {
                    console.error(err.message);
                    alert("Optimization failed. Please try another image.");
                    processBtn.innerHTML = `Process Image`;
                    processBtn.disabled = false;
                },
            });
        });
    </script>
</body>
</html>
